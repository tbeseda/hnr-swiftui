name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: |
          xcodebuild -project HNReader.xcodeproj \
            -scheme HNReader \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/HNReader.zip" HNReader.app

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 HNReader.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: HNReader.zip
          generate_release_notes: true
          append_body: true
          body: |
            **SHA256:** `${{ steps.sha.outputs.sha256 }}`

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/tbeseda/homebrew-tap.git" tap
          cd tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/hn-reader.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/hn-reader.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/hn-reader.rb
          git diff --cached --quiet || (git commit -m "Update hn-reader to ${VERSION}" && git push)
