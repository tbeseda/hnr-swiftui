name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project HNReader.xcodeproj \
            -scheme HNReader \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/HNReader.zip" HNReader.app

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: HNReader.zip
          generate_release_notes: true
